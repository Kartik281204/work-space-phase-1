services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: workspace_dev_pw
      POSTGRES_DB: workspace_saas
    ports:
      - '5432:5432'
    volumes:
      - workspace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:workspace_dev_pw@postgres:5432/workspace_saas?schema=public
      JWT_ACCESS_SECRET: change-this-to-a-long-random-string
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-this-to-a-different-long-random-string
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'

volumes:
  workspace_pgdata:
